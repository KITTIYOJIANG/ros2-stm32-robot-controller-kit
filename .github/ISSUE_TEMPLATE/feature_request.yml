name: Feature request
description: Suggest a new firmware, SDK, ROS2, hardware, documentation, or store feature.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this feature solve?
      placeholder: I want to use a different IMU, but the firmware currently assumes one bus setup.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Hardware
        - Firmware
        - Python SDK
        - ROS2 package
        - Documentation
        - Factory test
        - Store / fulfillment
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Links, diagrams, hardware part numbers, or similar projects.
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This request is about the robot controller kit.
          required: true
        - label: I checked existing issues for similar requests.
          required: true
