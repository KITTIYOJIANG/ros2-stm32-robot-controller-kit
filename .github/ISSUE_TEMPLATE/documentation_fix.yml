name: Documentation fix
description: Report unclear, outdated, missing, or incorrect documentation.
title: "[Docs]: "
labels: ["documentation", "triage"]
body:
  - type: input
    id: page
    attributes:
      label: Documentation page
      placeholder: "docs/quick_start.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or unclear?
      placeholder: The Quick Start says to run a command, but the expected output is missing.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix
      placeholder: Add expected output and a troubleshooting note.
    validations:
      required: false
  - type: dropdown
    id: audience
    attributes:
      label: Who is affected?
      options:
        - Beginner
        - Robotics student
        - Embedded developer
        - ROS2 developer
        - Seller / fulfillment operator
        - Other
    validations:
      required: false
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked the current documentation.
          required: true
        - label: I can provide a clearer wording or example.
          required: false
